name: Update AI news

on:
  schedule:
    - cron: "0 * * * *"      # 매시 정각 (UTC). GitHub 부하 시 지연될 수 있음.
  workflow_dispatch:          # 수동 실행 버튼

permissions:
  contents: write

concurrency:
  group: update-ai-news
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Fetch & summarize
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          RAPIDAPI_HOST: ${{ secrets.RAPIDAPI_HOST }}
          RSSHUB_BASES: ${{ secrets.RSSHUB_BASES }}
        run: python scripts/fetch.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json state.json
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "chore: update AI news $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
